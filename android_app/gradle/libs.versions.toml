[versions]
# SDK versions
compileSdk = "35"
minSdk = "33"
targetSdk = "35"

# Build tools - Stable Stack
agp = "8.7.3"
kotlin = "2.1.0"
ksp = "2.1.0-1.0.29"

# AndroidX Core
coreKtx = "1.15.0"
lifecycleRuntimeKtx = "2.8.7"
lifecycle = "2.8.7"
activityCompose = "1.9.3"
datastore = "1.1.0"

# Compose
composeBom = "2024.12.01"
composeNavigation = "2.8.5"
composeCompiler = "1.5.10"

# Dependency Injection (Hilt)
hilt = "2.53.1"
hiltNavigationCompose = "1.2.0"
room = "2.6.1"

# Networking
retrofit = "2.11.0"
okhttp = "4.12.0"
kotlinxSerializationJson = "1.7.3"
retrofitKotlinxSerialization = "1.0.0"
moshi = "1.15.1"
gson = "2.10.1"

# Image Loading
coil = "2.7.0"

# Media
media3 = "1.4.1"

# Security (no Google Play Services required)
securityCrypto = "1.1.0-alpha06"

# Biometric (AndroidX - no Play Services)
biometric = "1.2.0-alpha05"

# Image metadata
commonsImaging = "1.0.0-alpha5"

# Coroutines
coroutines = "1.9.0"

# Testing
junit = "4.13.2"
junitVersion = "1.2.1"
espressoCore = "3.6.1"
mockk = "1.13.13"
