name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.0)'
        required: true
        default: 'v0.2.0'

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            asset_name: vortex_server_amd64.deb
            bin_name: vortex_server_linux_amd64
            use_cross: false
            package_deb: true
            upload_static: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            asset_name: vortex_server_arm64.deb
            bin_name: vortex_server_linux_arm64
            use_cross: false
            package_deb: true
            upload_static: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: vortex_server.exe
            bin_name: vortex_server.exe
            use_cross: false
            package_deb: false
            upload_static: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Checkout Client
        uses: actions/checkout@v4
        with:
          repository: knp-org/vortex-client
          path: vortex-client

      - name: Checkout Liquid Glass UI
        uses: actions/checkout@v4
        with:
          repository: knp-org/liquid-glass-ui
          path: liquid-glass-ui

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: vortex-client/package-lock.json

      - name: Pack Liquid Glass UI
        run: |
          cd liquid-glass-ui
          npm install
          npm pack

      - name: Build Web Client
        run: |
          cd vortex-client
          npm install ../liquid-glass-ui/knp-org-liquid-glass-ui-*.tgz
          npm install
          npm run build
          cd ..
          mkdir -p static
          cp -r vortex-client/dist/* static/

      - name: Install cargo-deb
        if: matrix.package_deb
        run: cargo install cargo-deb

      - name: Build
        uses: actions-rs/cargo@v1
        with:
          use-cross: ${{ matrix.use_cross }}
          command: build
          args: --release --target ${{ matrix.target }} --bin vortex_server

      - name: Package Deb
        if: matrix.package_deb
        uses: actions-rs/cargo@v1
        with:
          use-cross: ${{ matrix.use_cross }}
          command: deb
          args: --target ${{ matrix.target }} --no-build --output ${{ matrix.asset_name }}

      - name: Rename Linux Binary
        if: matrix.target != 'x86_64-pc-windows-msvc'
        run: cp target/${{ matrix.target }}/release/vortex_server ${{ matrix.bin_name }}

      - name: Rename Windows Binary
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cp target/${{ matrix.target }}/release/vortex_server.exe ${{ matrix.bin_name }}

      - name: Upload Deb Artifact
        if: matrix.package_deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin_name }}
          path: ${{ matrix.bin_name }}

      - name: Package Static Assets
        if: matrix.upload_static
        run: tar -czvf static.tar.gz static/

      - name: Upload Static Artifact
        if: matrix.upload_static
        uses: actions/upload-artifact@v4
        with:
          name: static.tar.gz
          path: static.tar.gz

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            vortex_server_amd64.deb/vortex_server_amd64.deb
            vortex_server_arm64.deb/vortex_server_arm64.deb
            vortex_server_linux_amd64/vortex_server_linux_amd64
            vortex_server_linux_arm64/vortex_server_linux_arm64
            vortex_server.exe/vortex_server.exe
            static.tar.gz/static.tar.gz
